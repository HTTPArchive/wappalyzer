name: Upload icons to GCS

on:
  push:
    branches:
      - main
    paths:
      - "src/images/icons/*"
  workflow_dispatch:

jobs:
  test:
    name: Convert and upload
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Install dependencies
        run: yarn install

      - name: Validate
        run: yarn run validate

      - name: Convert icons
        run: yarn run convert

      - name: Upload to BQ
        id: upload
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo $GCP_SA_KEY > /tmp/gcp_key.json
          yarn run upload_to_gcs
